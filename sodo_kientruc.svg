<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 950" width="100%" height="100%">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.10" />
    </filter>

    <!-- Gradients -->
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>

    <!-- Reusable Folder Icon -->
    <g id="folderIcon">
      <path d="M 2 4 C 2 2.9 2.9 2 4 2 L 8 2 L 10 4 L 18 4 C 19.1 4 20 4.9 20 6 L 20 16 C 20 17.1 19.1 18 18 18 L 4 18 C 2.9 18 2 17.1 2 16 Z" fill="#ffb74d" stroke="#f57c00" stroke-width="1.2"/>
      <path d="M 2 7 L 20 7 L 20 16 C 20 17.1 19.1 18 18 18 L 4 18 C 2.9 18 2 17.1 2 16 Z" fill="#ffe082"/>
    </g>

    <!-- Reusable Database Cylinder Icon -->
    <g id="dbIcon">
      <ellipse cx="12" cy="5" rx="8" ry="3" fill="#ffcc80" stroke="#e65100" stroke-width="1.2" />
      <path d="M 4 5 L 4 11 A 8 3 0 0 0 20 11 L 20 5" fill="#ffcc80" stroke="#e65100" stroke-width="1.2" />
      <path d="M 4 11 L 4 17 A 8 3 0 0 0 20 17 L 20 11" fill="#ffcc80" stroke="#e65100" stroke-width="1.2" />
      <ellipse cx="12" cy="11" rx="8" ry="3" fill="none" stroke="#e65100" stroke-width="1.2" />
      <ellipse cx="12" cy="17" rx="8" ry="3" fill="none" stroke="#e65100" stroke-width="1.2" />
    </g>

    <!-- Reusable Earth/API Icon -->
    <g id="apiIcon">
      <circle cx="12" cy="12" r="9" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2" />
      <ellipse cx="12" cy="12" rx="3" ry="9" fill="none" stroke="#2e7d32" stroke-width="0.8" />
      <ellipse cx="12" cy="12" rx="9" ry="3" fill="none" stroke="#2e7d32" stroke-width="0.8" />
      <line x1="3" y1="12" x2="21" y2="12" stroke="#2e7d32" stroke-width="1" />
      <line x1="12" y1="3" x2="12" y2="21" stroke="#2e7d32" stroke-width="1" />
    </g>

    <!-- Reusable Android Icon -->
    <g id="androidIcon">
      <path d="M 6 10 C 6 6.7 8.7 4 12 4 C 15.3 4 18 6.7 18 10 Z" fill="#3ddc84" />
      <rect x="6" y="11" width="12" height="7" rx="1.5" fill="#3ddc84" />
      <circle cx="9.5" cy="7.5" r="1.2" fill="#ffffff" />
      <circle cx="14.5" cy="7.5" r="1.2" fill="#ffffff" />
      <line x1="8.5" y1="4.5" x2="6.5" y2="2" stroke="#3ddc84" stroke-width="1.2" stroke-linecap="round" />
      <line x1="15.5" y1="4.5" x2="17.5" y2="2" stroke="#3ddc84" stroke-width="1.2" stroke-linecap="round" />
      <rect x="3.2" y="11" width="2" height="5" rx="1" fill="#3ddc84" />
      <rect x="18.8" y="11" width="2" height="5" rx="1" fill="#3ddc84" />
      <rect x="8.5" y="18" width="2" height="3" rx="1" fill="#3ddc84" />
      <rect x="13.5" y="18" width="2" height="3" rx="1" fill="#3ddc84" />
    </g>

    <!-- Reusable Firebase Icon -->
    <g id="firebaseIcon">
      <path d="M 3.8 17.5 L 8.5 2.5 L 12 6.5 Z" fill="#ffca28" />
      <path d="M 12 6.5 L 8.5 2.5 L 3.8 17.5 C 3.6 18.2 4.2 18.8 4.9 18.6 Z" fill="#ffa000" />
      <path d="M 17.2 17.5 L 12 2.5 C 11.7 2.1 11.2 2.1 10.9 2.5 L 3.8 17.5 Z" fill="#f57c00" />
      <path d="M 10.9 9.5 L 12 6.5 L 17.2 17.5 C 17.4 18.2 16.8 18.8 16.1 18.6 Z" fill="#ffca28" />
    </g>

    <!-- Reusable Compose Icon -->
    <g id="composeIcon">
      <path d="M 12 2 L 2 7 L 12 12 L 22 7 Z" fill="#4285f4" />
      <path d="M 2 17 L 12 22 L 22 17 L 12 12 Z" fill="#34a853" opacity="0.8" />
      <path d="M 2 7 L 12 12 L 2 17 Z" fill="#fbbc05" opacity="0.8" />
      <path d="M 22 7 L 12 12 L 22 17 Z" fill="#ea4335" opacity="0.8" />
    </g>
  </defs>

  <!-- Global Stylesheet -->
  <style>
    .main-title { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 36px; font-weight: 800; fill: #0f172a; }
    .sub-title { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 500; fill: #334155; }
    .section-title { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 800; fill: #0f172a; letter-spacing: 0.8px; }
    
    .label-bold { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 23px; font-weight: 700; fill: #0f172a; }
    .label-regular { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 19px; font-weight: 600; fill: #334155; }
    .label-small { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 500; fill: #475569; }
    
    .badge-text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 20px; font-weight: 700; text-anchor: middle; }
    .btn-text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 20px; font-weight: 800; text-anchor: middle; }
    
    .app-title { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 800; fill: #0f172a; }
    .ch-char { font-family: 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; font-size: 28px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
    .ch-pinyin { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #e0f2fe; text-anchor: middle; }
    .ch-mean { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #ffffff; text-anchor: middle; }
    
    .conn-line { fill: none; stroke: #0284c7; stroke-width: 2.5; stroke-dasharray: 6,6; }
    .conn-line-orange { fill: none; stroke: #ea580c; stroke-width: 2.5; stroke-dasharray: 6,6; }
    .conn-line-green { fill: none; stroke: #16a34a; stroke-width: 2.5; stroke-dasharray: 6,6; }
  </style>

  <!-- Background Base Canvas -->
  <rect width="100%" height="100%" fill="#fafcff" rx="16" />

  <!-- HEADER ZONE -->
  <g transform="translate(60, 50)">
    <!-- Blue accent bar -->
    <rect width="6" height="52" rx="3" fill="#0284c7" />
    <text x="20" y="32" class="main-title">PANDAHSK SYSTEM</text>
    <text x="20" y="58" class="sub-title">Kiến trúc ứng dụng học tiếng Trung HSK theo mô hình Offline-First &amp; Đồng bộ đám mây</text>
  </g>

  <!-- ==================== CLIENT SIDE (LEFT COLUMN) ==================== -->
  <g transform="translate(60, 140)">
    <!-- Accent line and Section Header -->
    <rect width="4" height="24" rx="2" fill="#0284c7" />
    <text x="16" y="19" class="section-title">CLIENT SIDE (MOBILE APP)</text>

    <!-- 1. Android Emulator (Laptop Mockup) -->
    <g transform="translate(15, 60)" filter="url(#shadow)">
      <!-- Base Shadow & Base Base -->
      <path d="M -15 130 L 215 130 L 195 140 L 5 140 Z" fill="#94a3b8" />
      <!-- Laptop Screen Shell -->
      <rect x="15" y="10" width="170" height="110" rx="8" fill="#1e293b" stroke="#0f172a" stroke-width="2.5" />
      <!-- Inner Screen Area -->
      <rect x="23" y="18" width="154" height="94" rx="4" fill="#f1f5f9" />
      
      <!-- Mock Screen Content -->
      <rect x="30" y="25" width="140" height="12" rx="2" fill="#cbd5e1" />
      <rect x="30" y="42" width="45" height="60" rx="3" fill="#e2e8f0" />
      <rect x="82" y="42" width="88" height="60" rx="3" fill="#ffffff" />
      <circle cx="126" cy="72" r="18" fill="#38bdf8" opacity="0.3" />

      <!-- Keyboard Base -->
      <path d="M 0 120 L 200 120 L 215 130 L -15 130 Z" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1" />
      <!-- Trackpad -->
      <rect x="85" y="122" width="30" height="6" rx="1" fill="#94a3b8" />
      
      <!-- Label below -->
      <text x="100" y="175" class="label-bold" text-anchor="middle" style="font-size: 18.5px;">Android Emulator</text>
    </g>

    <!-- 2. Android Smartphone Mockup (To hơn & Chữ to hơn) -->
    <g transform="translate(5, 340)" filter="url(#shadow)">
      <!-- Outer Body -->
      <rect x="0" y="0" width="220" height="310" rx="26" fill="#0f172a" stroke="#334155" stroke-width="4" />
      <!-- Camera Notch -->
      <rect x="92" y="6" width="36" height="8" rx="4" fill="#000" />
      <!-- Inner Screen Screen -->
      <rect x="9" y="18" width="202" height="278" rx="20" fill="#f8fafc" />
      
      <!-- Mockup App Header -->
      <text x="110" y="38" class="app-title" text-anchor="middle">🐼 PANDAHSK</text>
      
      <!-- Progress Bar (Mini) -->
      <rect x="20" y="48" width="162" height="8" rx="4" fill="#cbd5e1" />
      <rect x="20" y="48" width="81" height="8" rx="4" fill="#3b82f6" />
      
      <!-- Question Card -->
      <rect x="20" y="64" width="162" height="64" rx="10" fill="url(#cloudGrad)" />
      <!-- Question Pinyin and Chinese word -->
      <text x="101" y="94" class="ch-char" style="font-size: 28px; font-weight: 800; fill: #ffffff; text-anchor: middle;">学习</text>
      <text x="101" y="116" class="ch-pinyin" style="font-size: 14px; font-weight: 500; fill: #e0f2fe; text-anchor: middle;">xuéxí</text>

      <!-- Options arranged in a 2x2 grid (2 ô 2 bên, to và rõ) -->
      <!-- Row 1: Option A & Option B -->
      <!-- Option A (Normal) -->
      <rect x="20" y="138" width="75" height="30" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
      <text x="57.5" y="157" fill="#334155" style="font-family: sans-serif; font-size: 11.5px; font-weight: 600; text-anchor: middle;">A. Chạy bộ</text>

      <!-- Option B (Correct Selected - Green) -->
      <rect x="107" y="138" width="75" height="30" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1" />
      <text x="144.5" y="157" fill="#15803d" style="font-family: sans-serif; font-size: 11.5px; font-weight: 800; text-anchor: middle;">B. Học tập</text>

      <!-- Row 2: Option C & Option D -->
      <!-- Option C (Normal) -->
      <rect x="20" y="178" width="75" height="30" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
      <text x="57.5" y="197" fill="#334155" style="font-family: sans-serif; font-size: 11.5px; font-weight: 600; text-anchor: middle;">C. Ăn cơm</text>

      <!-- Option D (Normal) -->
      <rect x="107" y="178" width="75" height="30" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1" />
      <text x="144.5" y="197" fill="#334155" style="font-family: sans-serif; font-size: 11.5px; font-weight: 600; text-anchor: middle;">D. Làm việc</text>

      <!-- Sync Info Bar -->
      <rect x="20" y="222" width="162" height="24" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1" />
      <text x="101" y="238" class="badge-text" fill="#15803d" style="font-size: 10.5px; font-weight: 800; text-anchor: middle;">✓ ĐỒNG BỘ STREAK &amp; LỊCH SỬ</text>

      <!-- Label below -->
      <text x="110" y="340" class="label-bold" text-anchor="middle" style="font-size: 18.5px;">Android Smartphone</text>
      <text x="110" y="362" class="label-regular" text-anchor="middle" style="font-size: 13.5px; fill: #64748b;">(Giao diện Trắc nghiệm)</text>
    </g>
  </g>

  <!-- ==================== INTERNET CLOUD (MIDDLE - BALANCED CENTERING AT X=438) ==================== -->
  <g transform="translate(418, 380)">
    <!-- Dotted Curves: Client -> Internet (Smooth S-curves) -->
    <path class="conn-line" d="M -173 -125 C -100 -125, -100 20, -15 20" />
    <path class="conn-line" d="M -133 255 C -70 255, -70 40, -15 40" />

    <!-- Dotted Curves: Internet -> Cloud Services (Arched curves) -->
    <path class="conn-line-orange" d="M 185 15 Q 280 -140 367 -75" />
    <path class="conn-line-green" d="M 185 40 Q 280 210 367 205" />

    <!-- Big Internet Cloud Shape (Scaled by 1.6 for uniform outer text) -->
    <g filter="url(#shadow)" transform="translate(-20, -10) scale(1.6)">
      <path d="M 0 10 
               A 22 22 0 0 1 35 -15 
               A 32 32 0 0 1 95 -15 
               A 22 22 0 0 1 130 10 
               A 18 18 0 0 1 120 35 
               L 10 35 
               A 18 18 0 0 1 0 10 Z" fill="url(#cloudGrad)" />
      <!-- Cloud Text -->
      <text x="65" y="11" class="badge-text" fill="#ffffff" style="font-size: 12.5px; font-weight: 850; letter-spacing: 0.8px;">INTERNET</text>
      <text x="65" y="26" class="badge-text" fill="#e0f2fe" style="font-size: 9px;">Wifi / 4G / 5G</text>
    </g>
  </g>

  <!-- ==================== CLOUD / API (RIGHT COLUMN - WIDENED TO 740 FOR CLOSE BUTTONS) ==================== -->
  <!-- Main container frame -->
  <rect x="760" y="140" width="740" height="600" rx="20" fill="#f8fafc" stroke="#c084fc" stroke-width="2.5" filter="url(#shadow)" />
  
  <!-- Container Header Badge (Centered at 760 + 740/2 = 1130) -->
  <g transform="translate(1000, 119)" filter="url(#shadow)">
    <rect width="260" height="42" rx="21" fill="#0f172a" />
    <text x="130" y="28" class="badge-text" fill="#ffffff" style="font-size: 26px; font-weight: 850; letter-spacing: 0.8px;">☁️ CLOUD / API</text>
  </g>

  <!-- 1. Cloud Firestore Section (Orange Box, Widen to 690, Height 250, Vertically Centered inside parent) -->
  <g transform="translate(785, 180)">
    <rect width="690" height="250" rx="12" fill="#fffdf9" stroke="#fbd38d" stroke-width="1.8" />
    
    <g transform="translate(0, 18)">
      <!-- Header info -->
      <use href="#dbIcon" x="20" y="22" transform="scale(1.4)" />
      <text x="60" y="34" class="label-bold" style="font-size: 26px; fill: #c2410c;">Cloud Firestore</text>
      <text x="60" y="54" class="label-small" style="fill: #9a3412; font-size: 18px;">NoSQL Cloud Database (Firebase Services)</text>
      
      <!-- Offline status badge -->
      <rect x="440" y="22" width="220" height="34" rx="17" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2" />
      <circle cx="457" cy="39" r="6" fill="#22c55e" />
      <text x="555" y="46" class="badge-text" fill="#15803d" style="font-size: 18px; text-anchor: middle;">Offline Cache Enabled</text>

      <!-- Items List -->
      <!-- Row 1: tuVung / baiHoc -->
      <g transform="translate(20, 80)">
        <rect x="465" y="-8" width="195" height="34" rx="17" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2" />
        <use href="#folderIcon" x="0" y="0" transform="scale(1.2)" />
        <text x="40" y="15"><tspan class="label-bold">tuVung/baiHoc:</tspan> <tspan class="label-regular">Dữ liệu HSK gốc</tspan></text>
        <text x="562.5" y="16" class="btn-text" fill="#2563eb">TẢI VỀ</text>
      </g>

      <!-- Row 2: nguoiDungTuVung -->
      <g transform="translate(20, 135)">
        <rect x="465" y="-8" width="195" height="34" rx="17" fill="#fff7ed" stroke="#f97316" stroke-width="1.2" />
        <use href="#folderIcon" x="0" y="0" transform="scale(1.2)" />
        <text x="40" y="15"><tspan class="label-bold">nguoiDungTuVung:</tspan> <tspan class="label-regular">Tiến trình &amp; SM-2</tspan></text>
        <text x="562.5" y="16" class="btn-text" fill="#ea580c">ĐỒNG BỘ 2 CHIỀU</text>
      </g>

      <!-- Row 3: flashcardCaNhan / lichSu -->
      <g transform="translate(20, 190)">
        <rect x="465" y="-8" width="195" height="34" rx="17" fill="#fff7ed" stroke="#f97316" stroke-width="1.2" />
        <use href="#folderIcon" x="0" y="0" transform="scale(1.2)" />
        <text x="40" y="15"><tspan class="label-bold">flashcard/lichSu:</tspan> <tspan class="label-regular">Thẻ nhớ &amp; thống kê</tspan></text>
        <text x="562.5" y="16" class="btn-text" fill="#ea580c">ĐỒNG BỘ 2 CHIỀU</text>
      </g>
    </g>
  </g>

  <!-- 2. External REST APIs Section (Green Box, Widen to 690, Height 230, Shifted to Y=470 for equal spacing) -->
  <g transform="translate(785, 470)">
    <rect width="690" height="230" rx="12" fill="#fcfdfc" stroke="#a7f3d0" stroke-width="1.8" />

    <g transform="translate(0, 16)">
      <!-- Header info -->
      <use href="#apiIcon" x="20" y="20" transform="scale(1.4)" />
      <text x="60" y="32" class="label-bold" style="font-size: 26px; fill: #166534;">External REST APIs</text>
      <text x="60" y="52" class="label-small" style="fill: #16a34a; font-size: 18px;">Tích hợp cổng thông tin mạng qua Retrofit</text>

      <!-- APIs List -->
      <!-- Row 1: MyMemory API -->
      <g transform="translate(20, 75)">
        <text x="20" y="15"><tspan class="label-bold">MyMemory API:</tspan> <tspan class="label-regular">Dịch văn bản Trung - Việt</tspan></text>
        <rect x="470" y="-7" width="190" height="34" rx="17" fill="#dcfce7" />
        <text x="565" y="17" class="badge-text" fill="#166534">zh ➔ vi</text>
      </g>

      <!-- Row 2: Thivien API -->
      <g transform="translate(20, 125)">
        <text x="20" y="15"><tspan class="label-bold">Thivien API:</tspan> <tspan class="label-regular">Lấy âm Hán Việt chữ Hán</tspan></text>
        <rect x="470" y="-7" width="190" height="34" rx="17" fill="#dcfce7" />
        <text x="565" y="17" class="badge-text" fill="#166534">Hán Việt</text>
      </g>

      <!-- Row 3: Tatoeba API -->
      <g transform="translate(20, 175)">
        <text x="20" y="15"><tspan class="label-bold">Tatoeba API:</tspan> <tspan class="label-regular">Tìm ví dụ song ngữ</tspan></text>
        <rect x="470" y="-7" width="190" height="34" rx="17" fill="#dcfce7" />
        <text x="565" y="17" class="badge-text" fill="#166534">cmn ➔ vie</text>
      </g>
    </g>
  </g>

  <!-- ==================== CORE PLATFORM LABELS (BOTTOM ROW - ALIGNED TO BOTTOM Y=800, CENTERED AT 780) ==================== -->
  <g transform="translate(780, 800)">
    <text x="0" y="10" class="section-title" text-anchor="middle" style="fill: #64748b; font-size: 22px;">CORE TECHNOLOGIES PLATFORM</text>
    
    <!-- Badge 1: Kotlin & Android -->
    <g transform="translate(-480, 35) scale(1.25)">
      <rect width="240" height="44" rx="22" fill="#f0fdf4" stroke="#4ade80" stroke-width="1.8" filter="url(#shadow)" />
      <use href="#androidIcon" x="15" y="11" />
      <text x="135" y="28" class="label-bold" style="fill: #166534; font-size: 18px;" text-anchor="middle">Kotlin &amp; Android</text>
    </g>

    <!-- Badge 2: Jetpack Compose -->
    <g transform="translate(-150, 35) scale(1.25)">
      <rect width="240" height="44" rx="22" fill="#faf5ff" stroke="#c084fc" stroke-width="1.8" filter="url(#shadow)" />
      <use href="#composeIcon" x="15" y="11" />
      <text x="135" y="28" class="label-bold" style="fill: #6b21a8; font-size: 18px;" text-anchor="middle">Jetpack Compose</text>
    </g>

    <!-- Badge 3: Firebase & Retrofit 2 -->
    <g transform="translate(180, 35) scale(1.25)">
      <rect width="240" height="44" rx="22" fill="#fff7ed" stroke="#fb923c" stroke-width="1.8" filter="url(#shadow)" />
      <use href="#firebaseIcon" x="15" y="11" />
      <text x="135" y="28" class="label-bold" style="fill: #9a3412; font-size: 18px;" text-anchor="middle">Firebase &amp; Retrofit 2</text>
    </g>
  </g>
</svg>
