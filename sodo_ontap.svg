<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 950" width="100%" height="100%">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="3" stdDeviation="3" flood-color="#263238" flood-opacity="0.12" />
    </filter>

    <!-- Gradients -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4faf4" />
      <stop offset="100%" stop-color="#c8e6c9" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3f9fe" />
      <stop offset="100%" stop-color="#bbdefb" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffbf5" />
      <stop offset="100%" stop-color="#ffe0b2" />
    </linearGradient>
    
    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#37474f" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 17px; font-weight: bold; fill: #1a237e; text-anchor: middle; }
    .node-text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 500; fill: #263238; text-anchor: middle; }
    .edge-text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: bold; fill: #e65100; text-anchor: middle; }
    .flow-line { fill: none; stroke: #37474f; stroke-width: 1.5; marker-end: url(#arrow); }
  </style>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#fcfcfc" rx="10" />

  <!-- Title -->
  <text x="300" y="30" class="title">SƠ ĐỒ LUỒNG ÔN TẬP TỪ VỰNG</text>

  <!-- Start Block -->
  <rect x="200" y="70" width="200" height="35" rx="17.5" fill="url(#greenGrad)" stroke="#2e7d32" stroke-width="1.1" filter="url(#shadow)" />
  <text x="300" y="92" class="node-text" style="font-weight: bold; fill: #1b5e20;">Mở ứng dụng (Trang chủ)</text>

  <!-- Step 1: Query due words -->
  <rect x="120" y="135" width="360" height="50" rx="6" fill="url(#blueGrad)" stroke="#1565c0" stroke-width="1.1" filter="url(#shadow)" />
  <text x="300" y="152" class="node-text" style="font-weight: bold;">Truy vấn từ vựng đến hạn ôn tập từ Firestore</text>
  <text x="300" y="167" class="node-text" style="font-size: 10.5px; fill: #455a64;">(Điều kiện: ngayOnTapTiepTheo &lt;= Hôm nay AND daHoc == true)</text>

  <!-- Decision 1: soTuCanOnTap > 0? -->
  <polygon points="300,215 380,245 300,275 220,245" fill="url(#orangeGrad)" stroke="#ef6c00" stroke-width="1.1" filter="url(#shadow)" />
  <text x="300" y="249" class="node-text">Có từ cần ôn?</text>

  <!-- Box 2a: Show static warning card -->
  <rect x="20" y="222.5" width="160" height="45" rx="6" fill="url(#blueGrad)" stroke="#1565c0" stroke-width="1.1" filter="url(#shadow)" />
  <text x="100" y="241" class="node-text">Hiện: "Chưa có từ ôn"</text>
  <text x="100" y="255" class="node-text" style="font-size: 10.5px; fill: #455a64;">(Card tĩnh không click)</text>

  <!-- Box 2b: Show clickable review items -->
  <rect x="200" y="305" width="200" height="40" rx="6" fill="url(#blueGrad)" stroke="#1565c0" stroke-width="1.1" filter="url(#shadow)" />
  <text x="300" y="324" class="node-text" style="font-weight: bold;">Hiển thị nút "Bài ôn tập X"</text>
  <text x="300" y="337" class="node-text" style="font-size: 10px; fill: #455a64;">(Người dùng click để bắt đầu)</text>

  <!-- Step 3: Load quiz content -->
  <rect x="150" y="375" width="300" height="40" rx="6" fill="url(#blueGrad)" stroke="#1565c0" stroke-width="1.1" filter="url(#shadow)" />
  <text x="300" y="399" class="node-text">Tải bộ từ ôn, trộn câu hỏi &amp; tạo đáp án sai</text>

  <!-- Step 4: Answer Question -->
  <rect x="160" y="445" width="280" height="40" rx="6" fill="url(#blueGrad)" stroke="#1565c0" stroke-width="1.1" filter="url(#shadow)" />
  <text x="300" y="469" class="node-text">Người học chọn đáp án trắc nghiệm</text>

  <!-- Decision 2: Correct? -->
  <polygon points="300,510 370,535 300,560 230,535" fill="url(#orangeGrad)" stroke="#ef6c00" stroke-width="1.1" filter="url(#shadow)" />
  <text x="300" y="539" class="node-text">Trả lời Đúng?</text>

  <!-- Box 5a: Correct (laDung = true) -> SM-2 updates -->
  <rect x="40" y="585" width="230" height="70" rx="6" fill="url(#blueGrad)" stroke="#1565c0" stroke-width="1.1" filter="url(#shadow)" />
  <text x="155" y="603" class="node-text" style="font-weight: bold; fill: #2e7d32;">Đúng (laDung = true):</text>
  <text x="155" y="618" class="node-text" style="font-size: 11px;">• repetitions = repetitions + 1</text>
  <text x="155" y="633" class="node-text" style="font-size: 11px;">• interval = 1, 6 hoặc (prevInt * EF)</text>
  <text x="155" y="647" class="node-text" style="font-size: 10px; fill: #455a64;">• Hẹn ngày ôn tiếp | +1 soTuOnTap</text>

  <!-- Box 5b: Incorrect (laDung = false) -> Reset repetitions -->
  <rect x="330" y="585" width="230" height="70" rx="6" fill="url(#blueGrad)" stroke="#1565c0" stroke-width="1.1" filter="url(#shadow)" />
  <text x="445" y="603" class="node-text" style="font-weight: bold; fill: #c62828;">Sai (laDung = false):</text>
  <text x="445" y="618" class="node-text" style="font-size: 11px;">• repetitions = 0, interval = 1</text>
  <text x="445" y="633" class="node-text" style="font-size: 11px;">• EF giảm (EF >= 1.3)</text>
  <text x="445" y="647" class="node-text" style="font-size: 10px; fill: #455a64;">• Hẹn lịch ôn lại vào Ngày mai</text>

  <!-- Decision 3: Finished all questions? -->
  <polygon points="300,680 370,705 300,730 230,705" fill="url(#orangeGrad)" stroke="#ef6c00" stroke-width="1.1" filter="url(#shadow)" />
  <text x="300" y="709" class="node-text">Còn câu hỏi?</text>

  <!-- Box 6: Complete session & update streak -->
  <rect x="150" y="760" width="300" height="40" rx="6" fill="url(#blueGrad)" stroke="#1565c0" stroke-width="1.1" filter="url(#shadow)" />
  <text x="300" y="779" class="node-text" style="font-weight: bold;">Lưu tiến trình, cập nhật Streak ngày</text>
  <text x="300" y="793" class="node-text" style="font-size: 10px; fill: #455a64;">(Đồng bộ Firestore &amp; hiển thị Thống kê kết quả)</text>

  <!-- End Block -->
  <rect x="200" y="830" width="200" height="35" rx="17.5" fill="url(#greenGrad)" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadow)" />
  <text x="300" y="852" class="node-text" style="font-weight: bold; fill: #1b5e20;">Kết thúc &amp; Về Trang chủ</text>


  <!-- ==================== FLOW LINES ==================== -->

  <!-- Flow lines -->
  <path class="flow-line" d="M 300 105 L 300 133" />
  <path class="flow-line" d="M 300 185 L 300 213" />
  
  <!-- Decision 1 -> False (No words due) -->
  <path class="flow-line" d="M 220 245 L 182 245" />
  <text x="200" y="237" class="edge-text">False</text>

  <!-- Decision 1 -> True (Words due) -->
  <path class="flow-line" d="M 300 275 L 300 303" />
  <text x="315" y="287" class="edge-text">True</text>

  <!-- Box 2b -> Step 3 -->
  <path class="flow-line" d="M 300 345 L 300 373" />

  <!-- Step 3 -> Step 4 -->
  <path class="flow-line" d="M 300 415 L 300 443" />

  <!-- Step 4 -> Decision 2 -->
  <path class="flow-line" d="M 300 485 L 300 508" />

  <!-- Decision 2 -> True -->
  <path class="flow-line" d="M 230 535 L 155 535 L 155 583" />
  <text x="185" y="527" class="edge-text">True</text>

  <!-- Decision 2 -> False -->
  <path class="flow-line" d="M 370 535 L 445 535 L 445 583" />
  <text x="415" y="527" class="edge-text">False</text>

  <!-- Merge paths to Decision 3 -->
  <path class="flow-line" d="M 155 655 L 155 670 L 230 705" />
  <path class="flow-line" d="M 445 655 L 445 670 L 370 705" />

  <!-- Decision 3 -> True (Next Question) -->
  <path class="flow-line" d="M 370 705 L 570 705 L 570 465 L 442 465" />
  <text x="535" y="697" class="edge-text">True</text>

  <!-- Decision 3 -> False -->
  <path class="flow-line" d="M 300 730 L 300 758" />
  <text x="315" y="742" class="edge-text">False</text>

  <!-- Box 6 -> End -->
  <path class="flow-line" d="M 300 800 L 300 828" />

</svg>
