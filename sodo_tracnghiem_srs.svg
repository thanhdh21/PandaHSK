<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 840" width="100%" height="100%">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#263238" flood-opacity="0.12" />
    </filter>

    <!-- Gradients -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4faf4" />
      <stop offset="100%" stop-color="#c8e6c9" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3f9fe" />
      <stop offset="100%" stop-color="#bbdefb" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffbf5" />
      <stop offset="100%" stop-color="#ffe0b2" />
    </linearGradient>
    
    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#37474f" />
    </marker>
  </defs>

  <style>
    .title { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 17px; font-weight: bold; fill: #1a237e; text-anchor: middle; }
    .node-text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 500; fill: #263238; text-anchor: middle; }
    .edge-text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: bold; fill: #e65100; text-anchor: middle; }
    .flow-line { fill: none; stroke: #37474f; stroke-width: 1.5; marker-end: url(#arrow); }
  </style>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="#fcfcfc" rx="10" />

  <!-- Title -->
  <text x="400" y="30" class="title">SƠ ĐỒ LUỒNG ÔN TẬP TRẮC NGHIỆM SRS</text>

  <!-- ==================== SHAPES & TEXTS ==================== -->

  <!-- Start Block -->
  <rect x="250" y="50" width="300" height="30" rx="15" fill="url(#greenGrad)" stroke="#2e7d32" stroke-width="1.1" filter="url(#shadow)" />
  <text x="400" y="69" class="node-text" style="font-weight: bold; fill: #1b5e20;">Khởi động trắc nghiệm SRS</text>

  <!-- Box 1: Load words -->
  <rect x="200" y="95" width="400" height="45" rx="6" fill="url(#blueGrad)" stroke="#1565c0" stroke-width="1.1" filter="url(#shadow)" />
  <text x="400" y="114" class="node-text">Tải danh sách từ vựng từ Firestore DB</text>
  <text x="400" y="129" class="node-text" style="font-size: 10.5px; fill: #455a64;">(Trắc nghiệm bài học OR đến hạn: ngayOnTap &lt;= Hôm nay)</text>

  <!-- Decision 0: Empty? -->
  <polygon points="400,155 470,185 400,215 330,185" fill="url(#orangeGrad)" stroke="#ef6c00" stroke-width="1.1" filter="url(#shadow)" />
  <text x="400" y="189" class="node-text">Trống?</text>

  <!-- Error Block -->
  <rect x="510" y="162.5" width="160" height="45" rx="6" fill="url(#blueGrad)" stroke="#1565c0" stroke-width="1.1" filter="url(#shadow)" />
  <text x="590" y="181" class="node-text">Hiển thị thông báo lỗi</text>
  <text x="590" y="196" class="node-text" style="font-size: 10.5px; fill: #455a64;">và quay lại</text>

  <!-- Box 2: Prep questions -->
  <rect x="200" y="230" width="400" height="45" rx="6" fill="url(#blueGrad)" stroke="#1565c0" stroke-width="1.1" filter="url(#shadow)" />
  <text x="400" y="248" class="node-text">Trộn câu hỏi &amp; tạo 3 phương án trắc nghiệm sai</text>
  <text x="400" y="263" class="node-text" style="font-size: 10.5px; fill: #455a64;">Hiển thị câu hỏi &amp; chờ người học chọn đáp án</text>

  <!-- Decision 1: Correct? -->
  <polygon points="400,290 470,320 400,350 330,320" fill="url(#orangeGrad)" stroke="#ef6c00" stroke-width="1.1" filter="url(#shadow)" />
  <text x="400" y="324" class="node-text">Trả lời đúng?</text>

  <!-- SM-2 Correct block -->
  <rect x="100" y="370" width="240" height="90" rx="6" fill="url(#blueGrad)" stroke="#1565c0" stroke-width="1.1" filter="url(#shadow)" />
  <text x="220" y="388" class="node-text" style="font-weight: bold; fill: #0d47a1;">SM-2 (Trả lời Đúng, q=4):</text>
  <text x="110" y="405" class="node-text" style="text-anchor: start; font-size: 11px;">• repetitions = repetitions + 1</text>
  <text x="110" y="420" class="node-text" style="text-anchor: start; font-size: 11px;">• interval = 1, 6 hoặc (prevInt * EF)</text>
  <text x="110" y="435" class="node-text" style="text-anchor: start; font-size: 11px;">• Cập nhật hệ số dễ EF (EF &gt;= 1.3)</text>
  <text x="110" y="450" class="node-text" style="text-anchor: start; font-size: 11px; fill: #2e7d32; font-weight: bold;">• Đặt daHoc = true; hẹn ngày ôn tiếp</text>

  <!-- SM-2 Incorrect block -->
  <rect x="460" y="370" width="240" height="90" rx="6" fill="url(#blueGrad)" stroke="#1565c0" stroke-width="1.1" filter="url(#shadow)" />
  <text x="580" y="388" class="node-text" style="font-weight: bold; fill: #0d47a1;">SM-2 (Trả lời Sai, q=1):</text>
  <text x="470" y="405" class="node-text" style="text-anchor: start; font-size: 11px;">• repetitions = 0 (reset lại số lần lặp)</text>
  <text x="470" y="420" class="node-text" style="text-anchor: start; font-size: 11px;">• interval = 1 (ôn lại vào ngày mai)</text>
  <text x="470" y="435" class="node-text" style="text-anchor: start; font-size: 11px;">• Giảm hệ số dễ EF (EF &gt;= 1.3)</text>
  <text x="470" y="450" class="node-text" style="text-anchor: start; font-size: 11px; fill: #d32f2f; font-weight: bold;">• Đặt ngayOnTap = Ngày mai</text>

  <!-- Box 3: Update Firestore DB -->
  <rect x="200" y="480" width="400" height="50" rx="6" fill="url(#blueGrad)" stroke="#1565c0" stroke-width="1.1" filter="url(#shadow)" />
  <text x="400" y="498" class="node-text">Lưu tiến trình vào Firestore (NguoiDungTuVung)</text>
  <text x="400" y="512" class="node-text" style="font-size: 10.5px; fill: #455a64;">Tích lũy stats ngày: soTuMoi (lần đầu học) / soTuOnTap (khi ôn tập)</text>
  <text x="400" y="525" class="node-text" style="font-size: 10.5px; fill: #455a64;">Cập nhật tổng số từ đã học (LichSuHoatDong) &amp; đổi màu UI</text>

  <!-- Decision 2: More Questions? -->
  <polygon points="400,545 470,575 400,605 330,575" fill="url(#orangeGrad)" stroke="#ef6c00" stroke-width="1.1" filter="url(#shadow)" />
  <text x="400" y="579" class="node-text">Còn câu hỏi?</text>

  <!-- Next Question Block (Shifted to right side column) -->
  <rect x="510" y="620" width="180" height="45" rx="6" fill="url(#blueGrad)" stroke="#1565c0" stroke-width="1.1" filter="url(#shadow)" />
  <text x="600" y="639" class="node-text">Tăng viTriHienTai += 1</text>
  <text x="600" y="653" class="node-text" style="font-size: 10.5px; fill: #455a64;">Reset trạng thái chọn đáp án</text>

  <!-- Box 4: Finish Quiz & Streak -->
  <rect x="280" y="635" width="240" height="45" rx="6" fill="url(#blueGrad)" stroke="#1565c0" stroke-width="1.1" filter="url(#shadow)" />
  <text x="400" y="653" class="node-text">Hoàn thành bài học &amp; cập nhật Streak</text>
  <text x="400" y="668" class="node-text" style="font-size: 10.5px; fill: #455a64;">Hiển thị màn hình kết quả chúc mừng</text>

  <!-- Decision 3: Redo? -->
  <polygon points="400,695 470,725 400,755 330,725" fill="url(#orangeGrad)" stroke="#ef6c00" stroke-width="1.1" filter="url(#shadow)" />
  <text x="400" y="729" class="node-text">Làm lại?</text>

  <!-- End Block -->
  <rect x="240" y="785" width="200" height="35" rx="17.5" fill="url(#greenGrad)" stroke="#2e7d32" stroke-width="1.5" filter="url(#shadow)" />
  <text x="340" y="807" class="node-text" style="font-weight: bold; fill: #1b5e20;">Kết thúc phiên học</text>


  <!-- ==================== FLOW LINES (DRAWN ON TOP) ==================== -->

  <!-- Start -> Box 1 -->
  <path class="flow-line" d="M 400 80 L 400 93" />

  <!-- Box 1 -> Decision 0 -->
  <path class="flow-line" d="M 400 140 L 400 153" />

  <!-- Decision 0 -> True (ends 2px before Error Block) -->
  <path class="flow-line" d="M 470 185 L 508 185" />
  <text x="487" y="177" class="edge-text">True</text>

  <!-- Error Block -> End Block -->
  <path class="flow-line" d="M 670 185 L 720 185 L 720 802 L 442 802" />

  <!-- Decision 0 -> False -->
  <path class="flow-line" d="M 400 215 L 400 228" />
  <text x="415" y="224" class="edge-text">False</text>

  <!-- Box 2 -> Decision 1 -->
  <path class="flow-line" d="M 400 275 L 400 288" />

  <!-- Decision 1 -> True -> SM-2 Correct -->
  <path class="flow-line" d="M 330 320 L 210 320 L 210 368" />
  <text x="270" y="312" class="edge-text">True</text>

  <!-- Decision 1 -> False -> SM-2 Incorrect -->
  <path class="flow-line" d="M 470 320 L 580 320 L 580 368" />
  <text x="530" y="312" class="edge-text">False</text>

  <!-- SM-2 Correct -> Box 3 -->
  <path class="flow-line" d="M 210 460 L 210 475 L 400 475 L 400 478" />

  <!-- SM-2 Incorrect -> Box 3 -->
  <path class="flow-line" d="M 590 460 L 590 475 L 400 475 L 400 478" />

  <!-- Box 3 -> Decision 2 -->
  <path class="flow-line" d="M 400 530 L 400 543" />

  <!-- Decision 2 -> True -> Next Question Block -->
  <path class="flow-line" d="M 470 575 L 600 575 L 600 618" />
  <text x="535" y="567" class="edge-text">True</text>

  <!-- Next Question Block -> Loop back (redirected along the right side margin at x=750) -->
  <path class="flow-line" d="M 600 665 L 600 680 L 750 680 L 750 252 L 602 252" />

  <!-- Decision 2 -> False -> Box 4 -->
  <path class="flow-line" d="M 400 605 L 400 633" />
  <text x="415" y="624" class="edge-text">False</text>

  <!-- Box 4 -> Decision 3 -->
  <path class="flow-line" d="M 400 680 L 400 693" />

  <!-- Decision 3 -> False -> End Block -->
  <path class="flow-line" d="M 400 755 L 400 783" />
  <text x="415" y="770" class="edge-text">False</text>

  <!-- Decision 3 -> True -> Redo Loop back (redirected along the rightmost side margin at x=770) -->
  <path class="flow-line" d="M 470 725 L 770 725 L 770 248 L 602 248" />
  <text x="535" y="717" class="edge-text">True</text>

</svg>
